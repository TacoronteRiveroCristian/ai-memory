name: ai-memory-brain

services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: ai-memory-qdrant
    restart: unless-stopped
    networks:
      - backend
    ports:
      - "127.0.0.1:6333:6333"
      - "127.0.0.1:6334:6334"
    volumes:
      - ${AI_MEMORY_QDRANT_VOLUME:-./volumes/qdrant}:/qdrant/storage
    environment:
      QDRANT__SERVICE__API_KEY: ${QDRANT_API_KEY}
      QDRANT__TELEMETRY_DISABLED: "true"
      QDRANT__STORAGE__ON_DISK_PAYLOAD: "true"
      QDRANT__STORAGE__OPTIMIZERS__MEMMAP_THRESHOLD_KB: "20000"

  postgres:
    image: pgvector/pgvector:pg16
    container_name: ai-memory-postgres
    restart: unless-stopped
    shm_size: "64mb"
    networks:
      - backend
    ports:
      - "127.0.0.1:5434:5432"
    volumes:
      - ${AI_MEMORY_POSTGRES_VOLUME:-./volumes/postgres}:/var/lib/postgresql/data
      - ./config/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8"
    command: >
      postgres
        -c shared_buffers=128MB
        -c effective_cache_size=512MB
        -c work_mem=4MB
        -c maintenance_work_mem=32MB
        -c max_connections=50
        -c wal_buffers=8MB
        -c checkpoint_completion_target=0.9
        -c random_page_cost=1.1
        -c effective_io_concurrency=200
        -c synchronous_commit=off
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:8-alpine
    container_name: ai-memory-redis
    restart: unless-stopped
    networks:
      - backend
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - ${AI_MEMORY_REDIS_VOLUME:-./volumes/redis}:/data
    command: >
      redis-server
        --save 300 1
        --loglevel warning
        --requirepass ${REDIS_PASSWORD}
        --maxmemory 128mb
        --maxmemory-policy allkeys-lru
        --appendonly no
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  mem0:
    build:
      context: ./mem0
      dockerfile: Dockerfile
    container_name: ai-memory-mem0
    restart: unless-stopped
    networks:
      - backend
      - frontend
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - ${AI_MEMORY_MEM0_VOLUME:-./volumes/mem0}:/app/history
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_EMBEDDING_MODEL: ${OPENAI_EMBEDDING_MODEL:-text-embedding-3-small}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY}
      DEEPSEEK_MODEL: ${DEEPSEEK_MEM0_MODEL:-deepseek-chat}
      DEEPSEEK_BASE_URL: ${DEEPSEEK_BASE_URL:-https://api.deepseek.com}
      MEM0_GRAPH_ENABLED: ${MEM0_GRAPH_ENABLED:-true}
      MEM0_GRAPH_DB_PATH: ${MEM0_GRAPH_DB_PATH:-/app/history/graph.kuzu}
      QDRANT_HOST: qdrant
      QDRANT_PORT: "6333"
      QDRANT_API_KEY: ${QDRANT_API_KEY}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      HISTORY_DB_PATH: /app/history/history.db
    depends_on:
      qdrant:
        condition: service_started
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5)\""]
      interval: 20s
      timeout: 10s
      retries: 10
      start_period: 40s

  api-server:
    build:
      context: ./api-server
      dockerfile: Dockerfile
    container_name: ai-memory-api
    restart: unless-stopped
    networks:
      - backend
      - frontend
    ports:
      - "8050:8050"
    environment:
      QDRANT_HOST: qdrant
      QDRANT_PORT: "6333"
      QDRANT_API_KEY: ${QDRANT_API_KEY}
      POSTGRES_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      MEM0_URL: http://mem0:8000
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      EMBEDDING_MODEL: ${OPENAI_EMBEDDING_MODEL:-text-embedding-3-small}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY}
      DEEPSEEK_MODEL: ${DEEPSEEK_MODEL:-deepseek-reasoner}
      DEEPSEEK_BASE_URL: ${DEEPSEEK_BASE_URL:-https://api.deepseek.com}
      MEM0_INGEST_TIMEOUT_SECONDS: ${MEM0_INGEST_TIMEOUT_SECONDS:-90}
      PROJECT_CONTEXT_WORKING_MEMORY_TIMEOUT_SECONDS: ${PROJECT_CONTEXT_WORKING_MEMORY_TIMEOUT_SECONDS:-2.0}
      PROJECT_CONTEXT_WORKING_MEMORY_LIMIT: ${PROJECT_CONTEXT_WORKING_MEMORY_LIMIT:-3}
      PROJECT_CONTEXT_WORKING_MEMORY_USE_GRAPH: ${PROJECT_CONTEXT_WORKING_MEMORY_USE_GRAPH:-false}
      API_KEY: ${MEMORY_API_KEY}
      LOG_LEVEL: INFO
      AI_MEMORY_TEST_MODE: ${AI_MEMORY_TEST_MODE:-false}
      AI_MEMORY_TEST_NOW: ${AI_MEMORY_TEST_NOW:-}
      WORKER_HEARTBEAT_KEY: reflection_worker:heartbeat
      WORKER_HEARTBEAT_MAX_AGE_SECONDS: ${WORKER_HEARTBEAT_TTL_SECONDS:-120}
    depends_on:
      qdrant:
        condition: service_started
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      mem0:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:8050/health"]
      interval: 20s
      timeout: 5s
      retries: 10
      start_period: 20s

  reflection-worker:
    build:
      context: ./reflection-worker
      dockerfile: Dockerfile
    container_name: ai-memory-reflection-worker
    restart: unless-stopped
    networks:
      - backend
      - frontend
    environment:
      POSTGRES_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      API_SERVER_URL: http://api-server:8050
      API_KEY: ${MEMORY_API_KEY}
      MEM0_URL: http://mem0:8000
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY}
      DEEPSEEK_MODEL: ${DEEPSEEK_MODEL:-deepseek-reasoner}
      DEEPSEEK_BASE_URL: ${DEEPSEEK_BASE_URL:-https://api.deepseek.com}
      REFLECTION_INTERVAL_SECONDS: ${REFLECTION_INTERVAL_SECONDS:-21600}
      REFLECTION_POLL_INTERVAL_SECONDS: ${REFLECTION_POLL_INTERVAL_SECONDS:-30}
      AI_MEMORY_TEST_MODE: ${AI_MEMORY_TEST_MODE:-false}
      AI_MEMORY_TEST_NOW: ${AI_MEMORY_TEST_NOW:-}
      WORKER_HEARTBEAT_KEY: reflection_worker:heartbeat
      WORKER_HEARTBEAT_TTL_SECONDS: ${WORKER_HEARTBEAT_TTL_SECONDS:-120}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      mem0:
        condition: service_started
      api-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import os, time; path='/tmp/reflection-worker-heartbeat'; now=time.time(); m=os.path.getmtime(path); raise SystemExit(0 if now - m < 120 else 1)\""]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s

  ui:
    build:
      context: ./ui
      dockerfile: Dockerfile
    container_name: ai-memory-ui
    restart: unless-stopped
    networks:
      - frontend
    ports:
      - "4173:4173"
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://api-server:8050}
      MEMORY_API_KEY: ${MEMORY_API_KEY}
    depends_on:
      api-server:
        condition: service_healthy

networks:
  frontend:
    driver: bridge
  backend:
    driver: bridge
    internal: true
