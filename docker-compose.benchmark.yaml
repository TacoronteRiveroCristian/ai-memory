# Override for token benchmark: isolated volumes
# Usage: docker compose -f docker-compose.yaml -f docker-compose.benchmark.yaml up -d
services:
  qdrant:
    volumes:
      - ./volumes/benchmark-qdrant:/qdrant/storage

  postgres:
    volumes:
      - ./volumes/benchmark-postgres:/var/lib/postgresql/data

  redis:
    volumes:
      - ./volumes/benchmark-redis:/data

  mem0:
    volumes:
      - ./volumes/benchmark-mem0:/app/history
